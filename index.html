<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Buscar Pokémon</h1>
    <input type="text" id="pokemonInput" placeholder="Escribe el nombre del Pokémon...">
    <button onclick="buscarPokemon()">Buscar</button>

    <div id="pokemonContainer" class="pokemon-container" style="display: none;">
        <img id="pokemonImage" src="" alt="Imagen del Pokémon">
        <h2 id="pokemonName"></h2>
        <p><strong>ID:</strong> <span id="pokemonId"></span></p>
        <p><strong>Tipo:</strong> <span id="pokemonType"></span></p>
        <p><strong>Habilidades:</strong> <span id="pokemonAbilities"></span></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
